<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Capitoli 21–25</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0b0d14; --surface: #13161f; --border: #252a3a; --border2: #2d3448; --text: #e8eaf0; --muted: #6b7280; --dim: #9ca3af; --ca: #8b5cf6; --glow: rgba(139,92,246,0.1); }
  body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .hero { background: linear-gradient(135deg, #0a0b1a 0%, #0b0d14 60%, #0d0a1a 100%); padding: 52px 24px 40px; text-align: center; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .hero::before { content: ""; position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 65%); pointer-events: none; }
  .hero-tag { display: inline-block; background: rgba(139,92,246,0.1); border: 1px solid #8b5cf655; color: #c4b5fd; font-size: 0.72rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 16px; border-radius: 99px; margin-bottom: 18px; }
  .hero h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); font-weight: 900; color: #fff; line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 10px; }
  .hero h1 span { color: #c4b5fd; }
  .hero p { color: var(--muted); font-size: 0.92rem; max-width: 480px; margin: 0 auto 28px; line-height: 1.6; }
  .stats-row { display: flex; justify-content: center; max-width: 360px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .stat { flex: 1; padding: 14px 8px; text-align: center; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-n { font-size: 1.4rem; font-weight: 800; color: #c4b5fd; }
  .stat-l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
  .prog-wrap { background: var(--surface); padding: 12px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .prog-label { font-size: 0.75rem; color: var(--muted); }
  .prog-count { font-size: 0.75rem; font-weight: 700; color: #c4b5fd; }
  .prog-bg { background: var(--border); border-radius: 99px; height: 4px; }
  .prog-fill { background: linear-gradient(90deg, #8b5cf6, #ec4899); height: 4px; border-radius: 99px; transition: width 0.35s; width: 0%; }
  .sec-head { max-width: 700px; margin: 0 auto; padding: 24px 24px 6px; }
  .sec-chip { display: inline-flex; background: rgba(139,92,246,0.1); border: 1px solid #8b5cf644; color: #c4b5fd; font-size: 0.68rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; }
  .sec-title { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-top: 5px; }
  .cards { max-width: 700px; margin: 0 auto; padding: 6px 24px; }
  .qcard { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 20px; margin-bottom: 10px; }
  .qnum { font-size: 0.68rem; font-weight: 700; color: #8b5cf6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
  .qtext { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; line-height: 1.5; margin-bottom: 12px; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 13px; border-radius: 8px; border: 1.5px solid var(--border2); margin-bottom: 6px; cursor: pointer; transition: all 0.18s; }
  .opt:hover { border-color: #8b5cf6; background: var(--glow); }
  .opt.selected { border-color: #8b5cf6; background: var(--glow); }
  .opt.correct { border-color: #10b981; background: rgba(16,185,129,0.08); }
  .opt.wrong { border-color: #ef4444; background: rgba(239,68,68,0.08); }
  .opt input[type=radio] { display: none; }
  .opt-l { width: 20px; height: 20px; border-radius: 5px; background: var(--border2); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--muted); flex-shrink: 0; transition: all 0.18s; }
  .opt.selected .opt-l { background: #8b5cf6; color: #fff; }
  .opt.correct .opt-l { background: #10b981; color: #fff; }
  .opt.wrong .opt-l { background: #ef4444; color: #fff; }
  .opt label { cursor: pointer; font-size: 0.88rem; color: #cbd5e1; line-height: 1.4; }
  .footer { max-width: 700px; margin: 0 auto; padding: 14px 24px 48px; }
  .submit-btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff; border: none; border-radius: 11px; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .submit-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; transform: none; }
  #result { display: none; max-width: 600px; margin: 0 auto; padding: 28px 24px 56px; }
  .res-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 24px; text-align: center; }
  .res-circle { width: 110px; height: 110px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 1.8rem; font-weight: 800; }
  .rg { background: rgba(16,185,129,0.1); color: #10b981; border: 3px solid #10b981; }
  .rm { background: rgba(245,158,11,0.1); color: #f59e0b; border: 3px solid #f59e0b; }
  .rb { background: rgba(239,68,68,0.1); color: #ef4444; border: 3px solid #ef4444; }
  .res-title { font-size: 1.25rem; font-weight: 800; color: #f1f5f9; margin-bottom: 5px; }
  .res-sub { color: var(--muted); font-size: 0.87rem; margin-bottom: 20px; }
  .res-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
  .rs { text-align: center; }
  .rs-n { font-size: 1.4rem; font-weight: 800; }
  .rs-n.g { color: #10b981; } .rs-n.r { color: #ef4444; } .rs-n.b { color: #c4b5fd; }
  .rs-l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .fb-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: left; margin-bottom: 18px; }
  .fb-title { font-size: 0.7rem; font-weight: 700; color: #c4b5fd; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .fb-text { font-size: 0.86rem; color: var(--dim); line-height: 1.65; }
  .loading { font-style: italic; color: var(--muted); }
  .errors-box { margin-top: 16px; text-align: left; }
  .errors-title { font-size: 0.75rem; font-weight: 700; color: #ef4444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .err-item { background: var(--bg); border: 1px solid rgba(239,68,68,0.25); border-radius: 9px; padding: 12px 14px; margin-bottom: 8px; }
  .err-num { font-size: 0.65rem; font-weight: 700; color: #ef4444; text-transform: uppercase; margin-bottom: 5px; }
  .err-question { font-size: 0.85rem; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; line-height: 1.4; }
  .err-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 4px; }
  .err-badge { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .err-badge.wb { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .err-badge.cb { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
  .err-answer { font-size: 0.82rem; color: var(--dim); line-height: 1.35; }
  .err-answer.ca { color: #6ee7b7; font-weight: 500; }
  .no-errors { text-align: center; padding: 16px; color: #10b981; font-size: 0.92rem; font-weight: 600; }
  .res-btns { display: flex; gap: 10px; }
  .btn-retry { flex: 1; padding: 12px; background: none; border: 1.5px solid var(--border2); color: var(--dim); border-radius: 9px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
  .btn-retry:hover { border-color: #8b5cf6; color: #c4b5fd; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-tag">Capitoli 21–25</div>
  <h1>Quiz – <span>Cap. 21–25</span></h1>
  <p>Baseline, Kick-off Meeting, processi di esecuzione, Project Manager e Team Building.</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-total">–</div><div class="stat-l">Domande</div></div>
    <div class="stat"><div class="stat-n">5</div><div class="stat-l">Capitoli</div></div>
    <div class="stat"><div class="stat-n">70%</div><div class="stat-l">Per passare</div></div>
  </div>
</div>
<div class="prog-wrap">
  <div class="prog-top"><span class="prog-label">Avanzamento</span><span class="prog-count" id="prog-count">0 / –</span></div>
  <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
</div>
<div id="quiz-body"></div>
<div class="footer"><button class="submit-btn" id="submit-btn" onclick="submitQuiz()" disabled>Consegna</button></div>
<div id="result">
  <div class="res-card">
    <div class="res-circle" id="res-circle"></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-sub" id="res-sub"></div>
    <div class="res-stats">
      <div class="rs"><div class="rs-n g" id="rs-ok">-</div><div class="rs-l">Corrette</div></div>
      <div class="rs"><div class="rs-n r" id="rs-no">-</div><div class="rs-l">Errate</div></div>
      <div class="rs"><div class="rs-n b" id="rs-pct">-</div><div class="rs-l">Punteggio</div></div>
    </div>
    <div class="fb-box"><div class="fb-title">💬 Feedback</div><div class="fb-text" id="fb-text"><span class="loading">Generazione…</span></div></div>
    <div class="errors-box" id="errors-box"></div>
    <div class="res-btns"><button class="btn-retry" onclick="resetQuiz()">🔄 Riprova</button></div>
  </div>
</div>
<script>
const sections = [
  {
    chip: "Cap. 21 — La Baseline",
    title: "Ciclo di pianificazione, tipi di baseline e PMB",
    qs: [{ q: 'Il ciclo di pianificazione si articola nelle fasi: Ideazione, Strutturazione, Negoziazione e:', o: ['Esecuzione', 'Condivisione', 'Controllo', 'Chiusura'], c: 1 },{ q: 'La "Baseline Iniziale" serve a:', o: ["Monitorare giornalmente l'avanzamento delle attività operative", "Stabilire l'impegno formale tra PM e committente all'inizio del progetto", 'Aggiornare il piano dopo ogni periodo di consolidamento', 'Confrontare i costi effettivi con quelli pianificati alla fine del progetto'], c: 1 },{ q: 'Il "Project Status by Data Date" contiene:', o: ['Solo gli obiettivi e i deliverable del progetto', 'WBS aggiornata, Schedule aggiornata, Risk aggiornato, Quality aggiornata, Costi aggiornati e commenti del PM', 'Solo la Cost Baseline e il confronto con i costi effettivi', 'Il Piano di Comunicazione e il Risk Register iniziale'], c: 1 }]
  },
  {
    chip: "Cap. 22 — Kick-off Meeting",
    title: "Riunione di avvio del progetto",
    qs: [{ q: 'Il Kick-off Meeting "costituisce la prima delle riunioni operative di progetto". Chi viene coinvolto?', o: ['Solo il PM e il Project Sponsor', 'Il team e i principali stakeholder interni', 'Tutti gli stakeholder interni ed esterni al progetto', 'Solo il team tecnico che eseguirà le attività'], c: 1 },{ q: 'La struttura del Kick-off Meeting segue:', o: ["L'ordine cronologico delle fasi del ciclo di vita del progetto", 'I capitoli del Piano di Progetto: obiettivi, deliverable, stakeholder, WBS, schedulazione, rischi, comunicazione ecc.', 'Un formato libero deciso dal PM in base alle esigenze del momento', "L'ordine di priorità degli stakeholder dal più al meno importante"], c: 1 },{ q: 'Perché "tutti i Progetti, indipendentemente dalle dimensioni, necessitano" del Kick-off?', o: ['Perché è un requisito legale obbligatorio per avviare qualsiasi progetto', 'Per riunire i diversi stakeholder, condividere il Piano, motivare il team e creare un clima positivo', 'Perché senza il Kick-off il Piano di Progetto non può essere approvato formalmente', 'Per identificare nuovi stakeholder non considerati nella fase di avvio'], c: 1 }]
  },
  {
    chip: "Cap. 23 — Processi di Esecuzione",
    title: "Definizione e collocazione nel ciclo PM",
    qs: [{ q: "I cinque gruppi di processi del Project Management nell'ordine corretto sono:", o: ['Planning → Initiating → Executing → Monitoring & Controlling → Closing', 'Initiating → Planning → Executing → Monitoring & Controlling → Closing', 'Initiating → Executing → Planning → Monitoring & Controlling → Closing', 'Planning → Executing → Initiating → Monitoring & Controlling → Closing'], c: 1 },{ q: 'I Processi di Esecuzione producono quale documento/output principale?', o: ['Il Project Charter approvato dallo Sponsor', 'Il Project Plan dettagliato con tutte le baseline', "L'avanzamento del progetto attraverso il completamento del lavoro pianificato (Project Status)", 'Il Report di Chiusura con le lesson learned'], c: 2 }]
  },
  {
    chip: "Cap. 24 — Il Project Manager",
    title: "Definizione, competenze e tipi di leadership",
    qs: [{ q: '"Un comune denominatore in tutti i progetti sono le persone, che possono essere contate, ma non sono numeri." Questa affermazione riguarda:', o: ['La gestione quantitativa delle risorse umane tramite FTE', 'Il principio fondamentale che le persone sono al centro del project management e richiedono competenze relazionali', "La metodologia di calcolo dell'effort in giorni/uomo", 'La valutazione delle performance individuali dei membri del team'], c: 1 },{ q: 'La Leadership Carismatica si caratterizza per:', o: ['Delega totale al team senza intervento diretto del leader', 'Comunicazione unidirezionale con ordini e critiche senza feedback', 'Capacità di ispirare, grande energia, entusiasmo, sicurezza e forti convinzioni', 'Massima attenzione sia ai risultati sia alle persone con gestione attiva del conflitto'], c: 2 },{ q: 'La Leadership Autoritaria presenta come caratteristica:', o: ['Il leader è invisibile e permissivo, lasciando al team totale autonomia', 'Il canale di comunicazione è unidirezionale; il gruppo non partecipa al processo decisionale', 'Il leader cerca di potenziare al massimo la bidirezionalità comunicativa', 'Il leader si concentra sulla crescita e il benessere degli altri prima della propria leadership'], c: 1 },{ q: 'La "Gestione Aziendale e Strategica" come area di competenza del PM riguarda:', o: ['Saper gestire elementi di schedulazione, costi, risorse e rischi di progetto', "La conoscenza e l'esperienza del settore e dell'organizzazione per migliorare le prestazioni e raggiungere i risultati aziendali", 'Le competenze necessarie per guidare, motivare e dirigere un gruppo di lavoro', 'La conoscenza degli standard internazionali di project management'], c: 1 }]
  },
  {
    chip: "Cap. 25 — Team Building",
    title: "Scopo e elementi del team building",
    qs: [{ q: 'Quale dei seguenti è un elemento che il Team Building mira a sviluppare secondo il materiale?', o: ['Competenze tecniche specifiche del settore del progetto', 'Capacità di affrontare circostanze in rapido mutamento e di gestire lo stress', 'Conoscenza approfondita degli standard e delle metodologie di PM', 'Abilità nella redazione di documenti formali di progetto'], c: 1 },{ q: '"Integrazione del team e spirito di squadra" è un elemento derivante dal Team Building. Quale altro elemento è citato nel materiale?', o: ['Incremento del budget disponibile per le risorse', 'Rispetto per le opinioni altrui e fiducia reciproca', 'Riduzione del numero di riunioni necessarie', 'Aumento della velocità di esecuzione delle singole attività'], c: 1 }]
  }
];
const allQ=[]; sections.forEach(s=>s.qs.forEach(q=>allQ.push({...q})));
const TOTAL=allQ.length; let answers=Array(TOTAL).fill(null);
document.getElementById("s-total").textContent=TOTAL;
document.getElementById("prog-count").textContent="0 / "+TOTAL;
function build(){const body=document.getElementById("quiz-body");body.innerHTML="";let gi=0;sections.forEach(sec=>{const sh=document.createElement("div");sh.className="sec-head";sh.innerHTML=`<div class="sec-chip">${sec.chip}</div><div class="sec-title">${sec.title}</div>`;body.appendChild(sh);const wrap=document.createElement("div");wrap.className="cards";sec.qs.forEach(()=>{const i=gi;const q=allQ[i];const card=document.createElement("div");card.className="qcard";card.innerHTML=`<div class="qnum">Domanda ${i+1} di ${TOTAL}</div><div class="qtext">${q.q}</div>${q.o.map((op,j)=>`<div class="opt" id="o-${i}-${j}" onclick="pick(${i},${j})"><input type="radio" name="q${i}"><div class="opt-l">${String.fromCharCode(65+j)}</div><label>${op}</label></div>`).join("")}`;wrap.appendChild(card);gi++;});body.appendChild(wrap);});}
function pick(qi,oi){answers[qi]=oi;for(let j=0;j<allQ[qi].o.length;j++)document.getElementById(`o-${qi}-${j}`).classList.remove("selected");document.getElementById(`o-${qi}-${oi}`).classList.add("selected");const done=answers.filter(a=>a!==null).length;document.getElementById("prog-fill").style.width=(done/TOTAL*100)+"%";document.getElementById("prog-count").textContent=`${done} / ${TOTAL}`;document.getElementById("submit-btn").disabled=done<TOTAL;}
function submitQuiz(){let score=0;const wrong=[];allQ.forEach((q,i)=>{const c=q.c,ch=answers[i];for(let j=0;j<q.o.length;j++){const el=document.getElementById(`o-${i}-${j}`);el.style.pointerEvents="none";if(j===c)el.classList.add("correct");else if(j===ch)el.classList.add("wrong");}if(ch===c)score++;else wrong.push({n:i+1,q:q.q,y:q.o[ch],c:q.o[c]});});document.getElementById("submit-btn").style.display="none";const pct=Math.round(score/TOTAL*100);const circle=document.getElementById("res-circle");circle.textContent=pct+"%";circle.className="res-circle "+(pct>=70?"rg":pct>=50?"rm":"rb");document.getElementById("res-title").textContent=pct>=80?"🎉 Ottimo!":pct>=60?"👍 Quasi!":"📚 Ripassia!";document.getElementById("res-sub").textContent=`Capitoli 21–25 · ${score}/${TOTAL} corrette`;document.getElementById("rs-ok").textContent=score;document.getElementById("rs-no").textContent=TOTAL-score;document.getElementById("rs-pct").textContent=pct+"%";document.getElementById("result").style.display="block";document.getElementById("result").scrollIntoView({behavior:"smooth"});buildErrors(wrong);fetchFeedback(score,pct,wrong);}
function buildErrors(wrong){const box=document.getElementById("errors-box");if(wrong.length===0){box.innerHTML='<div class="no-errors">✅ Perfetto!</div>';return;}let html=`<div class="errors-title">❌ Risposte errate (${wrong.length})</div>`;wrong.forEach(w=>{html+=`<div class="err-item"><div class="err-num">D${w.n}</div><div class="err-question">${w.q}</div><div class="err-row"><span class="err-badge wb">Tua</span><span class="err-answer">${w.y}</span></div><div class="err-row"><span class="err-badge cb">Corretta</span><span class="err-answer ca">${w.c}</span></div></div>`;});box.innerHTML=html;}
async function fetchFeedback(score,pct,wrong){const ws=wrong.length===0?"Nessun errore!":wrong.slice(0,6).map(w=>`- D${w.n}: "${w.q.substring(0,50)}…" → "${w.y}" (corretta: "${w.c}")`).join("\n");const prompt=`Professore di PM. Studente quiz Capitoli 21–25 (Cap 21-25: Baseline, PMB, Kick-off, processi esecuzione, leadership, competenze PM, Team Building). Risultato: ${score}/${TOTAL} (${pct}%). Errori: ${ws}. Feedback 4 righe italiano: incoraggiante, cosa ripassare, consiglio pratico.`;try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,messages:[{role:"user",content:prompt}]})});const d=await r.json();document.getElementById("fb-text").textContent=d.content?.find(b=>b.type==="text")?.text||"Feedback non disponibile.";}catch{document.getElementById("fb-text").textContent="Feedback non disponibile.";}}
function resetQuiz(){answers=Array(TOTAL).fill(null);document.getElementById("result").style.display="none";document.getElementById("submit-btn").style.display="block";document.getElementById("submit-btn").disabled=true;document.getElementById("prog-fill").style.width="0%";document.getElementById("prog-count").textContent=`0 / ${TOTAL}`;build();window.scrollTo(0,0);}
build();
</script>
</body>
</html>
